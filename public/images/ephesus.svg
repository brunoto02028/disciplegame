<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1b3a"/>
      <stop offset="35%" stop-color="#2a4a7a"/>
      <stop offset="65%" stop-color="#e8a040"/>
      <stop offset="100%" stop-color="#f0c860"/>
    </linearGradient>
    <linearGradient id="stone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4b88a"/>
      <stop offset="100%" stop-color="#a08860"/>
    </linearGradient>
    <linearGradient id="stoneD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b8a070"/>
      <stop offset="100%" stop-color="#8a7050"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="600" fill="url(#sky)"/>
  <!-- Sun glow -->
  <circle cx="400" cy="380" r="200" fill="#f0c860" opacity="0.3"/>
  <circle cx="400" cy="400" r="100" fill="#f5d878" opacity="0.2"/>
  <!-- Stars top -->
  <circle cx="100" cy="30" r="2" fill="#fff" opacity="0.7"/><circle cx="300" cy="50" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="650" cy="25" r="1.5" fill="#fff" opacity="0.6"/><circle cx="500" cy="60" r="1" fill="#fff" opacity="0.4"/>
  <!-- Distant hills -->
  <path d="M0 350 Q150 320 300 340 Q500 360 700 330 L800 345 L800 600 L0 600Z" fill="#8a7050" opacity="0.4"/>
  <!-- === Library of Celsus === -->
  <!-- Main facade wall -->
  <rect x="200" y="170" width="400" height="280" rx="3" fill="url(#stoneD)"/>
  <!-- Lower columns -->
  <rect x="220" y="210" width="28" height="200" rx="4" fill="url(#stone)" stroke="#c9a060" stroke-width="0.5"/>
  <rect x="285" y="210" width="28" height="200" rx="4" fill="url(#stone)" stroke="#c9a060" stroke-width="0.5"/>
  <rect x="350" y="210" width="28" height="200" rx="4" fill="url(#stone)" stroke="#c9a060" stroke-width="0.5"/>
  <rect x="420" y="210" width="28" height="200" rx="4" fill="url(#stone)" stroke="#c9a060" stroke-width="0.5"/>
  <rect x="488" y="210" width="28" height="200" rx="4" fill="url(#stone)" stroke="#c9a060" stroke-width="0.5"/>
  <rect x="555" y="210" width="28" height="200" rx="4" fill="url(#stone)" stroke="#c9a060" stroke-width="0.5"/>
  <!-- Column capitals -->
  <rect x="215" y="205" width="38" height="10" rx="2" fill="#d4b88a"/><rect x="280" y="205" width="38" height="10" rx="2" fill="#d4b88a"/>
  <rect x="345" y="205" width="38" height="10" rx="2" fill="#d4b88a"/><rect x="415" y="205" width="38" height="10" rx="2" fill="#d4b88a"/>
  <rect x="483" y="205" width="38" height="10" rx="2" fill="#d4b88a"/><rect x="550" y="205" width="38" height="10" rx="2" fill="#d4b88a"/>
  <!-- Entablature -->
  <rect x="200" y="195" width="400" height="14" rx="2" fill="#c9a870" stroke="#b09060" stroke-width="1"/>
  <!-- Triangular pediments (3 sections) -->
  <polygon points="300,160 210,195 390,195" fill="#b89870" stroke="#a08860" stroke-width="1"/>
  <polygon points="500,155 410,195 590,195" fill="#b89870" stroke="#a08860" stroke-width="1"/>
  <!-- Upper row smaller columns -->
  <rect x="245" y="160" width="18" height="38" rx="3" fill="url(#stone)"/>
  <rect x="310" y="160" width="18" height="38" rx="3" fill="url(#stone)"/>
  <rect x="345" y="160" width="18" height="38" rx="3" fill="url(#stone)"/>
  <rect x="440" y="160" width="18" height="38" rx="3" fill="url(#stone)"/>
  <rect x="505" y="160" width="18" height="38" rx="3" fill="url(#stone)"/>
  <rect x="540" y="160" width="18" height="38" rx="3" fill="url(#stone)"/>
  <!-- Upper entablature -->
  <rect x="230" y="152" width="170" height="10" rx="2" fill="#c9a870"/>
  <rect x="420" y="148" width="170" height="10" rx="2" fill="#c9a870"/>
  <!-- Niches between columns (dark) -->
  <rect x="258" y="250" width="20" height="50" rx="10" fill="#6a5540"/>
  <rect x="323" y="250" width="20" height="50" rx="10" fill="#6a5540"/>
  <rect x="458" y="250" width="20" height="50" rx="10" fill="#6a5540"/>
  <rect x="523" y="250" width="20" height="50" rx="10" fill="#6a5540"/>
  <!-- Statue bases in niches -->
  <rect x="262" y="290" width="12" height="6" rx="1" fill="#b89870"/>
  <rect x="327" y="290" width="12" height="6" rx="1" fill="#b89870"/>
  <rect x="462" y="290" width="12" height="6" rx="1" fill="#b89870"/>
  <rect x="527" y="290" width="12" height="6" rx="1" fill="#b89870"/>
  <!-- Steps -->
  <rect x="180" y="410" width="440" height="14" rx="2" fill="#b8a070"/>
  <rect x="165" y="424" width="470" height="14" rx="2" fill="#a89060"/>
  <rect x="150" y="438" width="500" height="14" rx="2" fill="#988050"/>
  <!-- Ground / foreground -->
  <rect x="0" y="452" width="800" height="148" fill="#7a6545"/>
  <path d="M0 460 Q200 455 400 465 Q600 475 800 460" stroke="#8a7555" stroke-width="1" fill="none"/>
  <!-- Scattered stone blocks -->
  <rect x="60" y="470" width="40" height="20" rx="3" fill="#a89060" opacity="0.6" transform="rotate(-5 80 480)"/>
  <rect x="650" y="475" width="35" height="18" rx="3" fill="#a89060" opacity="0.5" transform="rotate(8 667 484)"/>
  <rect x="120" y="480" width="25" height="14" rx="2" fill="#988050" opacity="0.5"/>
  <!-- Warm light glow -->
  <circle cx="400" cy="300" r="300" fill="#f0c860" opacity="0.06"/>
  <!-- Title -->
  <text x="400" y="545" text-anchor="middle" font-family="Georgia,serif" font-size="32" font-weight="700" fill="#c9a227" opacity="0.85">EPHESUS</text>
  <text x="400" y="573" text-anchor="middle" font-family="Georgia,serif" font-size="15" fill="#ffffff" opacity="0.5">Biblioteca de Celso</text>
</svg>
